name: Deploy SiteOS → Firebase Hosting

on:
  push:
    branches: [main]

env:
  FLUTTER_VERSION: '3.41.1'
  FIREBASE_PROJECT: siteos-app

jobs:
  deploy-web:
    name: Build & Deploy Flutter Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Write assets/env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > assets/env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> assets/env

      - name: Build Flutter Web
        run: flutter build web --release --web-renderer canvaskit --base-href /

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SITEOS }}
          channelId: live
          projectId: ${{ env.FIREBASE_PROJECT }}
          target: siteos-app
