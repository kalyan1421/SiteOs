name: CI/CD — Test & Deploy SiteOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.32.0'
  FIREBASE_PROJECT: siteos-app

jobs:
  # ── 1. Static analysis + tests ─────────────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Dart format check
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true

      - name: Flutter analyze (zero issues)
        run: flutter analyze --fatal-infos

      - name: Run unit & widget tests
        run: flutter test --coverage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  # ── 2. Android APK (debug, for artifact) ───────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Write assets/env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > assets/env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> assets/env

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: siteos-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── 3. Firebase Hosting (Flutter Web) ──────────────────────────────────────
  deploy-web:
    name: Deploy Web → Firebase Hosting
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Write assets/env
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > assets/env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> assets/env

      - name: Build Flutter Web (release, CanvasKit)
        run: flutter build web --release --web-renderer canvaskit --base-href /

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SITEOS }}
          channelId: live
          projectId: ${{ env.FIREBASE_PROJECT }}
          target: siteos-app

  # ── 4. PR Preview channel ──────────────────────────────────────────────────
  preview:
    name: Preview Deploy (PR)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Write assets/env (staging)
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL_STAGING }}" > assets/env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY_STAGING }}" >> assets/env

      - name: Build Flutter Web
        run: flutter build web --release --base-href /

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SITEOS }}
          projectId: ${{ env.FIREBASE_PROJECT }}
          target: siteos-app
