name: siteos
description: "SiteOS — construction management for Indian builders: BOQ, GST/RA billing, materials, labour, WhatsApp reports, and AI."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  url_launcher: ^6.1.14

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.7.0

  # Backend
  supabase_flutter: ^2.9.2

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Utilities
  intl: ^0.20.2
  logger: ^2.5.0
  syncfusion_flutter_pdfviewer: ^32.2.5
  file_picker: ^10.3.8
  image_picker: ^1.1.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.0
  
  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^1.1.1
  pdf: ^3.11.3
  printing: ^5.14.2
  firebase_core: ^4.10.0
  firebase_crashlytics: ^5.2.3

  # Feature modules (Phase 1–3 build)
  xml: ^6.5.0              # Tally Data Exchange XML export (RA billing)
  geolocator: ^13.0.1     # GPS / geofence attendance
  speech_to_text: ^6.6.2  # Hindi voice site reporting
  share_plus: ^10.1.4     # share exported PDFs / reports
  path_provider: ^2.1.5   # temp dir for generated files

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 23 # android >= 6.0
  # iOS marketing icon (1024x1024) must be fully opaque — strip any alpha.
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  # Android adaptive icon (API 26+). Foreground reuses the logo; the white
  # background matches the logo's canvas so it sits flush on launchers.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  generate: true
  uses-material-design: true

  # Assets
  assets:
    - assets/env
    - assets/images/
